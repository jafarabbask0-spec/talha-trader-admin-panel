<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL | TALHA BHAI</title>
    <link rel="icon" href="logo.png" type="image/png" />

    <style>
        :root { 
            --accent:#22c55e; --blue:#2563eb; --red:#ef4444; 
            --bg:#020617; --card:#0f172a; --text:#ffffff; --border:#1e293b; --input-bg:#020617;
        }
        body.light-mode { 
            --bg:#f1f5f9; --card:#ffffff; --text:#000000; --border:#cbd5e1; --input-bg:#f8fafc;
        }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; display:flex; justify-content:center; padding:20px; transition:0.3s;}
        
        .box { background:var(--card); padding:30px; border-radius:30px; width:450px; border:1px solid var(--border); box-shadow:0 20px 40px rgba(0,0,0,0.2); position:relative;}
        
        .header-section { position:relative; text-align:center; margin-bottom:25px; padding-top:10px;}
        .logo-img { width:100px; height:100px; border-radius:50%; animation:zoomInOut 4s infinite; border:3px solid var(--blue);}
        @keyframes zoomInOut {0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
        
        .theme-toggle { position:absolute; top:0; right:0; cursor:pointer; width:30px; height:30px; transition: 0.3s; z-index: 15;}
        
        .input-group { margin: 8px 0; position: relative; }
        input { width:100%; padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:var(--accent); font-weight: bold; outline: none; box-sizing: border-box; transition: 0.3s; margin-bottom: 10px;}
        input::placeholder { color: #555; font-weight: normal; }
        
        input.error-border { border-color: var(--red) !important; }
        .error-msg { color: var(--red); font-size: 12px; margin-top: -5px; margin-bottom: 10px; display: none; font-weight: 500; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background:var(--blue); color:white; border:none; width:100%; padding:15px; border-radius:12px; cursor:pointer; font-weight:bold; margin-top:12px;}

        .logout-btn { position:absolute; top:15px; left:15px; background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-size:11px; font-weight:bold; display: flex; align-items: center; gap: 5px; z-index: 10;}
        
        .search-container { position: relative; margin-top:20px;}
        .search-container input { padding-left: 45px; border-color: var(--blue); }
        .search-main-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; }

        .user-card { background:rgba(120,120,120,0.1); padding:15px; border-radius:15px; margin-top:12px; display:flex; justify-content:space-between; align-items:center; border-left:5px solid var(--blue);}
        .del-btn { background:var(--red); border:none; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:11px; font-weight:bold; display: flex; align-items: center; gap: 5px;}

        #toast { 
            visibility:hidden; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); 
            background:var(--blue); color:white; padding:12px 25px; border-radius:50px; 
            font-weight:bold; z-index:100; display: flex; align-items: center; gap: 10px;
        }
        #toast.show { visibility:visible; animation: pop 0.3s ease; }
        @keyframes pop { from {bottom: 0; opacity:0;} to {bottom: 30px; opacity:1;} }
        
        .hidden { display:none !important; }

        /* Toggles Styling */
        #toggleBox { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); display: none; }
        .t-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

<div id="toast">
    <span id="toastText">Done!</span>
    <img src="remove.png" id="toastIcon" style="display:none; width:20px;">
</div>

<div id="loginBox" class="box hidden">
    <div class="header-section">
        <img src="sun.png" id="themeIconLogin" class="theme-toggle" onclick="toggleTheme()">
        <img src="logo.png" class="logo-img">
    </div>
    <h2 style="text-align:center; margin:0; margin-bottom: 10px;">Admin Panel Login</h2>
    
    <div class="input-group">
        <input type="password" id="pass" placeholder="Enter Password" oninput="resetError()">
        <div id="loginError" class="error-msg">Please enter a password!</div>
    </div>

    <button class="btn" onclick="login()">
        <img src="login.png" style="width:20px;"> Login
    </button>
</div>

<div id="panelBox" class="box hidden">
    <button class="logout-btn" onclick="logout()">
        <img src="logout.png" style="width:14px;"> LOGOUT
    </button>
    
    <div class="header-section">
        <img src="sun.png" id="themeIconPanel" class="theme-toggle" onclick="toggleTheme()">
        <img src="logo.png" class="logo-img">
        <h3 style="margin:10px 0 0; color:var(--blue); text-transform: uppercase;">Ahmad Bhai Admin Panel</h3>
    </div>

    <input type="text" id="admin_n" placeholder="Admin Side User Name" style="border-color: var(--blue);" oninput="showToggles()">
    <input type="text" id="n" placeholder="User Name">
    <input type="text" id="i" placeholder="20-Digit Device ID" maxlength="20" oninput="showToggles()">
    <input type="text" id="trader_id" placeholder="User Trader ID (Quotex)" maxlength="8">
    <input type="email" id="e" placeholder="User Email">

    <div id="toggleBox">
        <div class="t-row"><span>Mobile Live</span><label class="switch"><input type="checkbox" id="t_android" checked><span class="slider"></span></label></div>
        <div class="t-row"><span>PC Live</span><label class="switch"><input type="checkbox" id="t_pc" checked><span class="slider"></span></label></div>
        <div class="t-row"><span>Loss Trade Win</span><label class="switch"><input type="checkbox" id="t_win" checked><span class="slider"></span></label></div>
        <div class="t-row"><span>Customize Leaderboard</span><label class="switch"><input type="checkbox" id="t_lb" checked><span class="slider"></span></label></div>
        <div class="t-row"><span>Payment</span><label class="switch"><input type="checkbox" id="t_p" checked><span class="slider"></span></label></div>
        <div class="t-row"><span>Payments</span><label class="switch"><input type="checkbox" id="t_t" checked><span class="slider"></span></label></div>
        <div class="t-row"><span>Analytics</span><label class="switch"><input type="checkbox" id="t_ana" checked><span class="slider"></span></label></div>
        <button class="btn" style="padding:8px; font-size:12px; background:var(--accent);" onclick="document.getElementById('toggleBox').style.display='none'">DONE</button>
    </div>

    <button class="btn" onclick="add()">
        <img src="upgrade.png" style="width:20px;"> UPGRADE
    </button>

    <div class="search-container">
        <img src="search.png" id="searchIcon" class="search-main-icon">
        <input type="text" id="s" placeholder="Search User" onkeyup="search()">
    </div>
    
    <div id="list" style="max-height:300px; overflow-y:auto; margin-top:10px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    // Domain Security Check
(function() {
    const authorizedDomain = "talha-trader-admin-panelcom.vercel.app";
    const currentDomain = window.location.hostname;

    if (currentDomain !== authorizedDomain && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
        // Agar domain match nahi karta, to redirect kar do
        window.location.href = "/undefined"; 
    }
})();

const firebaseConfig = { 
    apiKey:"AIzaSyDS3Vc-QJScL5UnpHAd3ZV-Sk-57plSjKI",
    authDomain:"reactions-maker-site.firebaseapp.com",
    projectId:"reactions-maker-site",
    databaseURL:"https://reactions-maker-site-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

function showToggles() {
    let ad = document.getElementById('admin_n').value.trim();
    let id = document.getElementById('i').value.trim();
    document.getElementById('toggleBox').style.display = (ad && id) ? "block" : "none";
}

function applyTheme(theme) {
    const themeIcon = (theme === 'light') ? 'moon.png' : 'sun.png';
    const searchIcon = (theme === 'light') ? 'search1.png' : 'search.png';
    if(theme === 'light') document.body.classList.add('light-mode');
    else document.body.classList.remove('light-mode');
    document.getElementById('themeIconLogin').src = themeIcon;
    document.getElementById('themeIconPanel').src = themeIcon;
    document.getElementById('searchIcon').src = searchIcon;
}

function toggleTheme() {
    let current = localStorage.getItem('theme') || 'dark';
    let newTheme = (current === 'dark') ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    applyTheme(newTheme);
}

function showToast(m, showIcon = false){
    let t = document.getElementById('toast');
    document.getElementById('toastText').innerText = m;
    document.getElementById('toastIcon').style.display = showIcon ? "block" : "none";
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function login(){
    let email="nasiriq703@gmail.com"; 
    let passInput = document.getElementById('pass');
    let errorMsg = document.getElementById('loginError');
    let passValue = passInput.value;
    if(!passValue) {
        passInput.classList.add('error-border');
        errorMsg.style.display = "block";
        return;
    }
    auth.signInWithEmailAndPassword(email, passValue).catch(() => showToast("Wrong Password"));
}

function resetError() {
    let passInput = document.getElementById('pass');
    let errorMsg = document.getElementById('loginError');
    passInput.classList.remove('error-border');
    errorMsg.style.display = "none";
}

function logout(){
    auth.signOut().then(() => showToast("Logged Out"));
}

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('panelBox').classList.remove('hidden');
        loadData();
    } else {
        document.getElementById('panelBox').classList.add('hidden');
        document.getElementById('loginBox').classList.remove('hidden');
        resetError();
    }
});

function add() {
    let adInput = document.getElementById('admin_n');
    let nInput = document.getElementById('n');
    let iInput = document.getElementById('i');
    let tInput = document.getElementById('trader_id');
    let eInput = document.getElementById('e');
    
    if(adInput.value.trim() !== "" && iInput.value.trim() !== ""){
        let perms = {
            android: document.getElementById('t_android').checked,
            pc: document.getElementById('t_pc').checked,
            win: document.getElementById('t_win').checked,
            lb: document.getElementById('t_lb').checked,
            p: document.getElementById('t_p').checked,
            t: document.getElementById('t_t').checked,
            ana: document.getElementById('t_ana').checked
        };

        db.ref('users').push({
            admin_note: adInput.value,
            id: iInput.value.replace(/\s/g, ''),
            name: nInput.value,
            trader_id: tInput.value,
            email: eInput.value,
            date: new Date().toLocaleDateString(),
            status: "active",
            permissions: perms
        }).then(()=>{
            showToast("User Upgraded!");
            adInput.value=""; nInput.value=""; iInput.value=""; tInput.value=""; eInput.value="";
            document.getElementById('toggleBox').style.display = "none";
        }).catch((err) => showToast("Error: " + err.message));
    } else {
        showToast("Admin Name & ID are required!");
    }
}

function loadData(){
    db.ref('users').on('value',s=>{
        let h="";
        s.forEach(c=>{
            let v=c.val();
            let searchKey = (v.admin_note || v.name).toLowerCase();
            h+=`<div class="user-card" data-admin="${searchKey}">
                <span>
                    <b style="color:var(--blue); text-transform:uppercase; font-size:15px;">${v.admin_note || 'No Name'}</b><br>
                    <b style="color:var(--text); font-size:12px;">${v.name}</b><br>
                    <small style="opacity:0.7;">Device: ${v.id}</small><br>
                    <small style="color:var(--accent);">Trader: ${v.trader_id || 'N/A'}</small>
                </span>
                <button class="del-btn" onclick="del('${c.key}', '${v.admin_note || v.name}')">
                    <img src="delete.png" style="width:12px;"> Delete
                </button>
            </div>`;
        });
        document.getElementById('list').innerHTML = h || "<p style='text-align:center;opacity:0.5'>Empty List</p>";
    });
}

function search(){
    let v=document.getElementById('s').value.toLowerCase();
    document.querySelectorAll('.user-card').forEach(u => {
        let adminAttr = u.getAttribute('data-admin');
        u.style.display = adminAttr.includes(v) ? "flex" : "none";
    });
}

function del(k, name){
    db.ref('users').child(k).remove().then(()=>showToast(name + " removed!", true));
}

window.onload = () => { applyTheme(localStorage.getItem('theme') || 'dark'); };
</script>
</body>
<script>(function() {
    const pKey = "AhmadBhai_Ultimate_v10";

    // 1. SETTINGS & 20 LAYOUTS
    let settings = JSON.parse(localStorage.getItem(pKey)) || {
        theme: 'dark', layout: 'default', radius: '12',
        dark: { accent: '#22c55e', blue: '#2563eb', red: '#ef4444' },
        light: { accent: '#22c55e', blue: '#2563eb', red: '#ef4444' }
    };

    const layouts = {
        default: "",
        glass: ".box { background: rgba(15,23,42,0.7) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1) !important; }",
        neon: ".box { border: 2px solid var(--blue) !important; box-shadow: 0 0 20px var(--blue) !important; }",
        sidebar_left: "body { justify-content: flex-start !important; padding:0; } .box { height: 100vh; width: 380px; border-radius: 0 !important; }",
        sidebar_right: "body { justify-content: flex-end !important; padding:0; } .box { height: 100vh; width: 380px; border-radius: 0 !important; }",
        floating: ".box { margin-top: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.8) !important; }",
        minimal: ".box { border: none !important; background: transparent !important; box-shadow: none !important; }",
        gradient_bg: "body { background: linear-gradient(45deg, #0f172a, #1e293b) !important; }",
        border_glow: ".box { border-top: 10px solid var(--blue) !important; }",
        rounded_max: ".box { border-radius: 60px !important; }",
        skewed: ".box { transform: perspective(1000px) rotateY(-5deg); }",
        retro: ".box { border: 4px solid #fff !important; box-shadow: 10px 10px 0 var(--blue) !important; border-radius:0 !important; }",
        soft: ".box { background: #1e293b !important; box-shadow: 20px 20px 60px #0a101f !important; }",
        future: ".box::before { content:'SYSTEM ONLINE'; position:absolute; top:-20px; color:var(--blue); font-size:10px; }",
        bordered: ".box { background: none !important; border: 1px dashed var(--blue) !important; }",
        ultra_wide: ".box { width: 95% !important; max-width:1300px !important; }",
        bottom_bar: ".box { position:fixed; bottom:0; left:0; right:0; width:100% !important; border-radius:0 !important; }",
        card_stack: ".box { box-shadow: 0 10px 0 var(--blue), 0 20px 0 var(--red) !important; }",
        outline_thin: ".box { background:transparent !important; border: 1px solid rgba(255,255,255,0.1) !important; }",
        cyber: ".box { clip-path: polygon(0% 15%, 15% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%); }"
    };

    const styleEl = document.createElement('style');
    styleEl.id = "ahmad-persistent-v10";
    document.head.appendChild(styleEl);

    window.applyAhmadSystem = function() {
        const mode = settings.theme;
        const colors = settings[mode];
        const rad = settings.radius + "px";
        
        styleEl.innerHTML = `
            :root { --blue: ${colors.blue} !important; --red: ${colors.red} !important; --accent: ${colors.accent} !important; }
            .box, .btn, input, .user-card, .logout-btn, .del-btn, .slider, .t-row { border-radius: ${rad} !important; }
            ${layouts[settings.layout] || ""}
            
            /* YOUR CUSTOM SELECTOR UI */
            .selector { width:100%; max-width:360px; margin:12px 0; position:relative; }
            .selector button {
              width:100%; display:flex; align-items:center; gap:10px; justify-content:flex-start;
              padding:12px; border-radius:10px; border:none; background:rgba(0,0,0,0.6); color:#fff; font-size:16px; cursor:pointer;
              box-shadow:0 6px 18px rgba(0,0,0,0.45);
            }
            .selector-options {
              display:none; position:absolute; top:54px; left:0; right:0; background:rgba(15,23,42,0.95); border-radius:10px;
              max-height:240px; overflow:auto; padding:6px 0; box-shadow:0 10px 30px rgba(0,0,0,0.6); z-index:50;
              border: 1px solid rgba(255,255,255,0.1);
            }
            .selector-options div { padding: 12px; color: #fff; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .selector-options div:hover { background: var(--blue); }
            
            #ahmadModal {
                width: 380px; border: none; padding: 0; position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%); z-index: 999999; border-radius: 25px;
                background: ${mode === 'dark' ? '#0f172a' : '#ffffff'};
                color: ${mode === 'dark' ? '#fff' : '#000'};
                box-shadow: 0 40px 120px rgba(0,0,0,0.9); font-family: sans-serif; overflow: hidden;
            }
            #ahmadModal::backdrop { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
            .h-head { background: var(--blue); padding: 18px; text-align: center; color: #fff; font-weight: bold; }
            .h-body { padding: 20px; }
            .h-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(128,128,128,0.1); padding: 10px; border-radius: 12px; }
            .h-btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 12px; margin-top: 10px; background: var(--blue); color: #fff; }
            .h-label { font-size: 11px; font-weight: bold; opacity: 0.6; margin-top: 10px; display: block; }
        `;
        localStorage.setItem(pKey, JSON.stringify(settings));
    };

    applyAhmadSystem();

    window.openAhmadEngine = function() {
        if(document.getElementById('ahmadModal')) return;
        const diag = document.createElement('dialog');
        diag.id = "ahmadModal";
        diag.innerHTML = `
            <div class="h-head">AHMAD BHAI ENGINE v10.0</div>
            <div class="h-body">
                <span class="h-label">UI THEME & LAYOUT</span>
                <div class="selector" id="themeSel">
                    <button>Theme: ${settings.theme.toUpperCase()}</button>
                    <div class="selector-options">
                        <div data-val="dark">Dark Night</div>
                        <div data-val="light">Pure Light</div>
                    </div>
                </div>

                <div class="selector" id="layoutSel">
                    <button>Layout: ${settings.layout.toUpperCase()}</button>
                    <div class="selector-options">
                        ${Object.keys(layouts).map(l => `<div data-val="${l}">${l.replace('_',' ').toUpperCase()}</div>`).join('')}
                    </div>
                </div>

                <span class="h-label">BORDER RADIUS</span>
                <div class="h-row"><input type="range" id="sRad" min="0" max="50" value="${settings.radius}" style="width:100%; accent-color:var(--blue);"></div>

                <span class="h-label">COLOR PALETTE</span>
                <div class="h-row"><span>Blue</span><input type="color" id="cBlue" value="${settings[settings.theme].blue}"></div>
                <div class="h-row"><span>Red</span><input type="color" id="cRed" value="${settings[settings.theme].red}"></div>
                <div class="h-row"><span>Accent</span><input type="color" id="cAcc" value="${settings[settings.theme].accent}"></div>

                <button id="hSave" class="h-btn">SAVE CHANGES</button>
                <button id="hReset" class="h-btn" style="background:transparent; color:var(--red); font-size:12px;">RESET TO DEFAULT</button>
            </div>
        `;
        document.body.appendChild(diag);
        diag.showModal();

        // Custom Selector Logic
        diag.querySelectorAll('.selector button').forEach(btn => {
            btn.onclick = () => {
                const opts = btn.nextElementSibling;
                opts.style.display = opts.style.display === 'block' ? 'none' : 'block';
            };
        });

        diag.querySelector('#themeSel .selector-options').onclick = (e) => {
            if(e.target.dataset.val) {
                settings.theme = e.target.dataset.val;
                diag.querySelector('#themeSel button').innerText = "Theme: " + settings.theme.toUpperCase();
                e.currentTarget.style.display = 'none';
                applyAhmadSystem();
            }
        };

        diag.querySelector('#layoutSel .selector-options').onclick = (e) => {
            if(e.target.dataset.val) {
                settings.layout = e.target.dataset.val;
                diag.querySelector('#layoutSel button').innerText = "Layout: " + settings.layout.toUpperCase();
                e.currentTarget.style.display = 'none';
                applyAhmadSystem();
            }
        };

        diag.querySelector('#sRad').oninput = (e) => { settings.radius = e.target.value; applyAhmadSystem(); };
        diag.querySelector('#cBlue').oninput = (e) => { settings[settings.theme].blue = e.target.value; applyAhmadSystem(); };
        diag.querySelector('#cRed').oninput = (e) => { settings[settings.theme].red = e.target.value; applyAhmadSystem(); };
        diag.querySelector('#cAcc').oninput = (e) => { settings[settings.theme].accent = e.target.value; applyAhmadSystem(); };
        
        diag.querySelector('#hSave').onclick = () => { diag.close(); diag.remove(); };
        diag.querySelector('#hReset').onclick = () => {
            localStorage.removeItem(pKey);
            location.reload();
        };
    };
})();

</script>
</html>
